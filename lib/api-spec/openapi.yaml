openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: fraud
    description: Fraud detection operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analyze:
    post:
      operationId: analyzeMessage
      tags: [fraud]
      summary: Analyze a message for fraud indicators
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponse"
        "500":
          description: Analysis failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
      required:
        - text
    AnalyzeResponse:
      type: object
      properties:
        risk_level:
          type: string
          enum: [High, Low, Uncertain]
        confidence:
          type: number
          minimum: 0
          maximum: 100
        reasons:
          type: array
          items:
            type: string
        recommended_actions:
          type: array
          items:
            type: string
      required:
        - risk_level
        - confidence
        - reasons
        - recommended_actions
    AnalyzeError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
